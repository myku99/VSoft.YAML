---
#gnerated with dpmspec creator. comments will be lost when regenerated
# DPM package manifest file

min client version: 1.0

metadata:
  id: VSoft.YAML
  version: 1.5.5
  description: YAML Parser
  authors: [Vincent Parrett]
  projectUrl: https://github.com/VSoftTechnologies/VSoft.YAML
  repositoryUrl: https://github.com/VSoftTechnologies/VSoft.YAML
  repositoryCommit: #HASH#
  license: Apache-2.0
  copyright: Vincent Parrett and Contributors
  tags: [yaml, parser]
  readme: README.md

# define variable defaults - can be overriden in targetPlatforms
variables:
  packageSource: Rad Studio $compilernoprefix$

targetPlatforms:
  # use ranges to simplify the file
  - compilers: [delphixe2, delphixe3]
    platforms: [win32, win64, macos32]
    # if not specified default template used
  - compiler: delphixe4
    platforms: [win32, win64, macos32, ios32, iossimulator]
  - compilers: [delphixe5, delphixe6, delphixe7]
    platforms: [win32, win64, macos32, android, ios32, iossimulator]
  - compilers: [delphixe8, delphi10.0, delphi10.1]
    platforms: [win32, win64, macos32, android, ios32, ios64, iossimulator]
  - compiler: delphi10.2
    platforms: [win32, win64, macos32, android, ios32, ios64, iossimulator, linux64]
  - compiler: delphi10.3
    platforms: [win32, win64, macos32, macos64, android, android64, ios32, ios64, iossimulator, linux64]
  - compiler: delphi10.4
    platforms: [win32, win64, macos64, android, android64, ios64, iossimulator, linux64]
  - compilers: [delphi11.0, delphi12.0]
    platforms: [win32, win64, macos64, macosarm64, android, android64, ios64, linux64]
  - compilers: [delphi13.0]
    platforms: [win32, win64, winarm64ec, macos64, macosarm64, android, android64, ios64, linux64]

templates:
  - name: default
    source:
      - src: Source/*.pas
      - src: Source/*.inc
      - src: Packages/$packageSource$/*.dproj
      - src: Packages/$packageSource$/*.dpk
    build:
      - project: ./Packages/$packageSource$/VSoft.YAMLR.dproj
        config: Release
